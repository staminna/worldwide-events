name: eventscraper_app
description: "Worldwide events explorer — Flutter client for the Go eventscraper backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  maplibre_gl: ^0.26.2
  geolocator: ^14.0.3
  flutter_compass: ^0.8.1
  shared_preferences: ^2.5.5
  palette_generator: ^0.3.3
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
